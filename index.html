<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BHW Group — Import and Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #ffffff;
      font-family: 'Montserrat', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* רקע דקורטיבי */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at center, #f5f5f5 0%, #e8e8e8 60%, #d0d0d0 100%);
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      padding: 40px 20px;
    }

    /* פס אדום עליון */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: #CC0000;
      z-index: 10;
    }

    /* פס שחור תחתון */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: #111111;
      z-index: 10;
    }

    /* כרטיס מרכזי */
    .card {
      background: #ffffff;
      border-radius: 4px;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.08),
        0 20px 60px rgba(0,0,0,0.12);
      padding: 60px 80px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 580px;
      width: 100%;
      border-top: 5px solid #CC0000;
    }

    .logo-wrapper {
      width: 100%;
      max-width: 380px;
      margin-bottom: 40px;
    }

    .logo-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #CC0000;
      margin-bottom: 28px;
    }

    .tagline {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 4px;
      color: #888888;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 36px;
    }

    .contact-btn {
      display: inline-block;
      padding: 14px 40px;
      background: #111111;
      color: #ffffff;
      font-family: 'Montserrat', Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s ease;
    }

    .contact-btn:hover {
      background: #CC0000;
    }

    .footer-note {
      margin-top: 50px;
      font-size: 11px;
      color: #aaaaaa;
      letter-spacing: 1px;
    }

    @media (max-width: 520px) {
      .card {
        padding: 40px 28px 36px;
      }
      .logo-wrapper {
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="bottom-bar"></div>

  <div class="page-wrapper">
    <div class="card">
      <div class="logo-wrapper">
        <img src="logo.png" alt="BHW Group — Import and Marketing">
      </div>
      <div class="divider"></div>
      <p class="tagline">Coming Soon</p>

    </div>
    <p class="footer-note">© 2026 BHW Group. All rights reserved.</p>
  </div>
</body>
</html>
